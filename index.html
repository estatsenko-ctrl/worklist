<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Создать заявку</title>

<style>
body { margin: 0; font-family: Arial, sans-serif; background: #f5f6f8; }
.container { max-width: 420px; margin: auto; padding: 20px; }
.card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
h2 { margin-top: 0; }
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}
textarea { resize: none; height: 80px; }
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: black;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
button:disabled {
  background: gray;
  cursor: not-allowed;
}
button:hover:not(:disabled) { opacity: 0.9; }

.success {
  display: none;
  text-align: center;
  color: green;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">
  <div class="card">
    <h2>Создать заявку</h2>

    <select id="firm" onchange="checkFirm()">
      <option value="">Выберите фирму</option>
      <option>Липецк Холод Логистик ООО</option>
      <option>Компани ООО</option>
      <option>Меридиан ООО</option>
      <option>Водолей ООО</option>
      <option>Старт ап Кофе ООО</option>
      <option>ИП Павлов П.А</option>
      <option>ТД Торг Сервис ООО</option>
      <option>ЛипецкРыба-Производство ООО</option>
      <option>ИП Павлов А.Н</option>
      <option>ЛК Центр Бизнес Холод ООО</option>
      <option>ИП Павлова Н.В</option>
      <option>Настоящая рыбная компания ООО</option>
      <option>Р-Групп ООО</option>
      <option>РИК ООО</option>
      <option>РыбКом ООО</option>
      <option>Особняк ООО</option>
      <option value="other">Другое</option>
    </select>

    <input id="customFirm" placeholder="Введите фирму" style="display:none;">
    <input id="department" placeholder="Подразделение">
    <input id="responsible" placeholder="Ответственное лицо">
    <input id="number" placeholder="Номер">
    <textarea id="description" placeholder="Описание"></textarea>

    <button id="btn" onclick="send()">Отправить</button>
    <div class="success" id="success">✅ Отправлено!</div>
  </div>
</div>

<script>
function checkFirm() {
  let firm = document.getElementById("firm").value;
  let custom = document.getElementById("customFirm");
  custom.style.display = firm === "other" ? "block" : "none";
}

async function send() {
  const btn = document.getElementById("btn");
  btn.disabled = true;

  let firmSelect = document.getElementById("firm").value.trim();
  let customFirm = document.getElementById("customFirm").value.trim();

  let firm = firmSelect === "other" ? customFirm : firmSelect;

  let department = document.getElementById("department").value.trim();
  let responsible = document.getElementById("responsible").value.trim();
  let number = document.getElementById("number").value.trim();
  let description = document.getElementById("description").value.trim();

  if (!firm || !department || !responsible || !number || !description) {
    alert("Пожалуйста, заполните все поля!");
    btn.disabled = false;
    return;
  }

  if (firmSelect === "other" && !customFirm) {
    alert("Введите название фирмы");
    btn.disabled = false;
    return;
  }

  try {
    let response = await fetch("https://script.google.com/macros/s/AKfycbyE7JYjjIlAPGa8BoiV5Gd15xXm7H_EvxQga56YVv6zTKFdeV7aAuL1edKP4Qi2X69R/exec", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        firm: firm,
        department: department,
        responsible: responsible,
        number: number,
        description: description
      })
    });

    let text = await response.text();

    if (text === "OK") {
      document.getElementById("success").style.display = "block";

      document.getElementById("firm").value = "";
      document.getElementById("customFirm").value = "";
      document.getElementById("customFirm").style.display = "none";
      document.getElementById("department").value = "";
      document.getElementById("responsible").value = "";
      document.getElementById("number").value = "";
      document.getElementById("description").value = "";

      setTimeout(() => {
        document.getElementById("success").style.display = "none";
      }, 3000);

    } else {
      alert("Ошибка сервера: " + text);
    }

  } catch (error) {
    alert("Ошибка сети: " + error.message);
  }

  btn.disabled = false;
}
</script>

</body>
</html>
